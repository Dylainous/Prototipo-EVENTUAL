name: app_eventual
description: "Aplicación móvil para Club de Suboficiales - Planificación de Eventos"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  http: ^1.2.1

  # Estado (BLoC)
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Inyección de dependencias
  get_it: ^7.7.0

  # Almacenamiento local (token JWT)
  shared_preferences: ^2.3.1

  # Utilidades de fecha/calendario
  intl: ^0.19.0
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/Eventual.png
